<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- AWS Corporate Orange to Accent Yellow Gradient -->
    <linearGradient id="awsGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FFC300" />
    </linearGradient>
  </defs>
  
  <!-- Dark Slate Background Layer -->
  <rect width="512" height="512" rx="96" fill="#232F3E"/>
  
  <!-- High Contrast Bold Monogram -->
  <text x="50%" y="54%" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="260" 
        font-weight="900" 
        fill="url(#awsGrad)" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        letter-spacing="-6">BM</text>
</svg>
